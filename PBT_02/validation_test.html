<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kiểm tra Validation HTML5</title>
</head>
<body>
    <h2>Bài test 5 trường hợp Validation</h2>
    <form action="#">
        
        <label>TH 1 (Required):</label>
        <input type="text" required value=""><br><br>

        <label>TH 2 (Email):</label>
        <input type="email" value="abc"><br><br>

        <label>TH 3 (Min/Max):</label>
        <input type="number" min="1" max="10" value="15"><br><br>

        <label>TH 4 (Pattern):</label>
        <input type="text" pattern="[0-9]{10}" value="abc123"><br><br>

        <label>TH 5 (Minlength):</label>
        <input type="password" minlength="8" value="123"><br><br>

        <button type="submit">Gửi Dữ Liệu (Submit)</button>
    </form>
</body>
</html>
