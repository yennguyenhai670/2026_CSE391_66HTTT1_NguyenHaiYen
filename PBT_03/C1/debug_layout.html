<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Debug Layout</title>
    <link rel="stylesheet" href="debug_layout.css">
</head>
<body>

    <h1>Cách 1: Dùng Border-box</h1>
    <div class="container clearfix">
        <div class="sidebar fix-1">Sidebar (Border-box)</div>
        <div class="content fix-1">Content (Border-box)</div>
    </div>

    <h1>Cách 2: Tính toán thủ công (Content-box)</h1>
    <div class="container clearfix">
        <div class="sidebar fix-2-sidebar">Sidebar (Trừ hao width)</div>
        <div class="content fix-2-content">Content (Trừ hao width)</div>
    </div>

</body>
</html>
